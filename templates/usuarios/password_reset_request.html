<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Recuperar contraseña - Nails Nice</title>
  </head>
  <body style="font-family: Arial, sans-serif; max-width:700px;margin:24px auto;padding:18px;">
    <h2>Recuperar contraseña</h2>

    {% if messages %}
      {% for message in messages %}
        <div style="padding:10px;margin:8px 0;border-radius:4px;background:#f1f1f1;">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <p>Introduce tu correo; si existe una cuenta, recibirás un código de 6 dígitos.</p>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" style="padding:8px 12px;border-radius:4px;background:#007bff;color:white;border:none;">Enviar código</button>
    </form>

    <p style="margin-top:16px;"><a href="/">Volver al inicio</a></p>
  </body>
</html>
